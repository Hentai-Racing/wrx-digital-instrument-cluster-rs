[package]
    name         = "wrx-digital-instrument-cluster-rs"
    description  = "A digital instrument cluster for the 2018 Subaru WRX"
    repository   = "https://github.com/Hentai-Racing/wrx-digital-instrument-cluster-rs"
    version      = "0.11.6"                                                             # Only 1.0.0 when all factory features exist
    authors      = ["Bryce Happel Walton <brycewaltonmail@gmail.com>"]
    edition      = "2024"
    build        = "build.rs"
    license-file = "LICENSE"
    readme       = "README.md"

[features]
    default     = ["wayland", "slcan"]
    wayland     = ["slint/backend-winit-wayland", "slint/renderer-skia-opengl"]
    apalis_imx8 = ["dep:gpio-cdev", "dep:uinput"]
    slcan       = ["dep:slcan", "dep:serial"]

[dependencies]
    slint             = { git = "https://github.com/slint-ui/slint.git", default-features = false, features = ["compat-1-2", "std"] }
    async-compat      = "*"
    rand              = "*"
    paste             = "*"
    clap              = "*"
    embedded-can      = "*"
    futures           = "*"
    bitvec            = "*"
    serde             = { version = "*", features = ["std", "derive"] }
    serde_bytes       = "*"
    toml              = "*"
    tokio             = { version = "*", features = ["sync", "rt-multi-thread", "macros"], default-features = false }
    crossbeam-channel = "*"
    num_enum          = "*"

    # feature deps
    gpio-cdev = { version = "*", optional = true, features = ["async-tokio"] }
    uinput    = { version = "*", optional = true }
    serial    = { version = "*", optional = true }
    slcan     = { git = "https://github.com/bryce-happel-walton/slcan.git", optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
    socketcan = "*"

[build-dependencies]
    slint-build = { git = "https://github.com/slint-ui/slint.git" }
    dbc-codegen = { git = "https://github.com/bryce-happel-walton/dbc-codegen.git", branch = "feature/inverted-bit-signals", features = ["std"] } #* https://github.com/technocreatives/dbc-codegen/pull/97
    syn         = "*"
    walkdir     = "*"

[profile.apalis_imx8]
    inherits  = "release"
    lto       = "fat"
    opt-level = "s"
    panic     = "abort"
    strip     = true
