[package]
name = "wrx-digital-instrument-cluster-rs"
description = "A digital instrument cluster for the 2018 Subaru WRX"
repository = "https://github.com/Hentai-Racing/wrx-digital-instrument-cluster-rs"
version = "0.6.0"                                                                 # Only 1.0.0 when all factory features exist
authors = ["Bryce Happel Walton <brycewaltonmail@gmail.com>"]
edition = "2021"
build = "build.rs"
license-file = "LICENSE"
readme = "README.md"

[features]
default = [
    "slint/backend-winit",
    "slint/renderer-skia-opengl",
    "slcan",
    "network",
]
kms = ["slint/backend-linuxkms", "slint/renderer-skia-opengl"]
apalis_imx8 = ["dep:gpio-cdev", "kms"]
network = ["dep:reqwest"]
three-d = [
    "dep:three-d",
] # https://github.com/slint-ui/slint/issues/7845 skia does not work well with opengl context sharing, and femtovg doesn't work well in general
slcan = ["dep:slcan", "dep:serial"]

[dependencies]
slint = { git = "https://github.com/slint-ui/slint.git", default-features = false, features = [
    "compat-1-2",
    "std",
] }
async-compat = "*"
rand = "*"
paste = "*"
clap = "*"
embedded-can = "*"
futures = "*"

image = "*"

# feature deps
gpio-cdev = { version = "*", optional = true, features = ["async-tokio"] }
three-d = { git = "https://github.com/asny/three-d.git", optional = true }
serial = { version = "*", optional = true }

# feature deps network
slcan = { version = "*", optional = true }
reqwest = { version = "*", optional = true }

# required due to dbc-codegen
bitvec = "*"
tokio = { version = "*", features = [
    "sync",
    "signal",
    "rt-multi-thread",
    "macros",
], default-features = false }

[target.'cfg(target_os = "linux")'.dependencies]
socketcan = { version = "*", features = ["tokio"] }

[build-dependencies]
slint-build = { git = "https://github.com/slint-ui/slint.git" }
dbc-codegen = { git = "https://github.com/technocreatives/dbc-codegen.git", rev = "af7cbf3" }
syn = "*"
prettyplease = "*"

[profile.apalis_imx8]
inherits = "release"
lto = "fat"
opt-level = "s"
panic = "abort"
strip = true
