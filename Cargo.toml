[package]
name = "wrx-digital-instrument-cluster-rs"
description = "A digital instrument cluster for the 2018 Subaru WRX"
repository = "https://github.com/Hentai-Racing/wrx-digital-instrument-cluster-rs"
version = "0.3.2"
authors = ["Bryce Happel Walton <brycewaltonmail@gmail.com>"]
edition = "2021"
build = "build.rs"
license-file = "LICENSE"
readme = "README.md"

[features]
default = ["slint/backend-winit", "slint/renderer-skia"]

[dependencies]
slint = { version = "=1.8.0", default-features = false, features = [
	"compat-1-2",
	"std",
] }
socketcan = { version = "3.3.1", features = ["tokio"] }
rand = "0.8.5"
tokio = { version = "1.42.0", features = [
	"sync",
	"signal",
	"rt-multi-thread",
	"macros",
], default-features = false }
async-compat = "0.2.4"
paste = "1.0.15"

# required due to dbc-codegen
bitvec = "1.0.1"
embedded-can = "0.4.1"
futures = "0.3.31"
slcan = "0.1.3"        # TODO: implement slcan for development

[build-dependencies]
slint-build = { version = "=1.8.0" }
dbc-codegen = { git = "https://github.com/technocreatives/dbc-codegen.git", rev = "af7cbf3" }
syn = "2.0.91"
prettyplease = "0.2.25"
