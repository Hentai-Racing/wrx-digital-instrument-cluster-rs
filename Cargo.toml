[package]
name = "wrx-digital-instrument-cluster-rs"
description = "A digital instrument cluster for the 2018 Subaru WRX"
repository = "https://github.com/Hentai-Racing/wrx-digital-instrument-cluster-rs"
version = "0.5.0"
authors = ["Bryce Happel Walton <brycewaltonmail@gmail.com>"]
edition = "2021"
build = "build.rs"
license-file = "LICENSE"
readme = "README.md"

[features]
default = ["slint/backend-winit", "slint/renderer-skia-opengl"]
kms = ["slint/backend-linuxkms", "slint/renderer-skia-opengl"]
apalis_imx8 = ["dep:gpio-cdev"]
three_d = [
	"dep:three-d",
	"slint/renderer-femtovg",
] # https://github.com/slint-ui/slint/issues/7845
slcan = ["dep:slcan"]

[dependencies]
slint = { git = "https://github.com/slint-ui/slint.git", default-features = false, features = [
	"compat-1-2",
	"std",
] }
rand = "0.9.0"
paste = "1.0.15"

# feature deps
gpio-cdev = { version = "0.6.0", optional = true, features = ["async-tokio"] }
three-d = { git = "https://github.com/asny/three-d.git", optional = true }
slcan = { version = "0.1.3", optional = true }

# required due to dbc-codegen
bitvec = "1.0.1"
embedded-can = "0.4.1"
futures = "0.3.31"
tokio = { version = "1.44.0", features = [
	"sync",
	"signal",
	"rt-multi-thread",
	"macros",
], default-features = false }

[target.'cfg(target_os = "linux")'.dependencies]
socketcan = { version = "3.5.0", features = ["tokio"] }

async-compat = "0.2.4"

[build-dependencies]
slint-build = { git = "https://github.com/slint-ui/slint.git" }
dbc-codegen = { git = "https://github.com/technocreatives/dbc-codegen.git", rev = "af7cbf3" }
syn = "2.0.100"
prettyplease = "0.2.30"
